name: workbench

services:
  app:
    build: .
    image: workbench:latest
    container_name: workbench
    ports:
      - "3000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./scripts:/app/scripts
      - ./downloads:/app/downloads
    environment:
      - PYTHONUNBUFFERED=1
      - API_KEY=your_api_key_here
      - SECRET_KEY=change_me_to_a_random_string
      - SCREENDIR=/tmp/screen_sockets
      - LOG_LEVEL=info
      - TZ=Asia/Shanghai
    restart: unless-stopped
    privileged: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - workbench-net

networks:
  workbench-net:
    driver: bridge
